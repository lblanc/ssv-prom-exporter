{{template "header" .}}
{{if .Saved}}<div class="flash ok">Connection saved.</div>{{end}}

<div class="card">
  <h2>Prometheus connection</h2>
  <p class="hint">A single endpoint is used by both modes: as the source in
    <a href="/export">Export</a> and as the remote-write target in
    <a href="/import">Import</a>.</p>
  <form method="post" action="/">
    <label>URL</label>
    <input type="text" name="url" value="{{.Connection.URL}}" placeholder="http://localhost:9090" required>
    <div class="row">
      <div>
        <label>Username (optional)</label>
        <input type="text" name="username" value="{{.Connection.Username}}">
      </div>
      <div>
        <label>Password (optional)</label>
        <input type="password" name="password" value="{{.Connection.Password}}">
      </div>
    </div>
    <label><input type="checkbox" name="insecure" {{if .Connection.Insecure}}checked{{end}}> Skip TLS verification</label>
    <div class="button-row">
      <button type="submit">Save</button>
      <button type="button" class="secondary" onclick="testConn(this)">Test connection</button>
    </div>
    <div class="test-result"></div>
  </form>
</div>

<script>
async function testConn(btn) {
  const form = btn.closest('form');
  const params = new URLSearchParams(new FormData(form)).toString();
  const out = form.querySelector('.test-result');
  out.textContent = 'testing…';
  try {
    const r = await fetch('/test', {
      method: 'POST',
      body: params,
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    });
    const t = await r.text();
    out.textContent = (r.ok ? '✓ ' : '✗ ') + t;
    out.style.color = r.ok ? 'var(--ok)' : 'var(--err)';
  } catch (e) {
    out.textContent = 'network error: ' + e;
    out.style.color = 'var(--err)';
  }
}
</script>
{{template "footer" .}}
