name: Release

# Triggers on annotated/lightweight tags shaped like vX.Y.Z(-suffix).
# Builds the Windows binary + MSI, the Linux tarball, and the multi-arch
# Docker images (ssv-prom-exporter + prom-clip), then publishes them on
# a new GitHub Release whose name and tag both come from the pushed tag.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release from (e.g. v0.1.0). Required."
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
            git checkout "$tag"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install wixl
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends wixl

      - name: Build windows binary + MSI
        run: make msi VERSION=${{ steps.tag.outputs.tag }}

      - name: Build linux tarball
        run: make tarball-linux VERSION=${{ steps.tag.outputs.tag }}

      - name: Stage release artifacts
        id: stage
        run: |
          ver="${{ steps.tag.outputs.tag }}"
          ver_bare="${ver#v}"
          out=stage
          mkdir -p "$out"
          cp "bin/ssv-prom-exporter.exe" "$out/ssv-prom-exporter-${ver}-windows-amd64.exe"
          cp "bin/ssv-prom-exporter-${ver_bare}-x64.msi" "$out/"
          cp "dist/ssv-prom-exporter-${ver}-linux-amd64.tar.gz" "$out/"
          (cd "$out" && sha256sum ssv-prom-exporter-* > SHA256SUMS)
          ls -la "$out"

      # Extract the section for this tag from CHANGELOG.md and use it
      # as the release body. Section format (Keep a Changelog):
      #   ## [vX.Y.Z] - YYYY-MM-DD
      #   ...content...
      #   ## [next-version] OR end of file
      # Falls back to a one-line note if the section is missing so the
      # workflow doesn't fail an otherwise-good release.
      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          ver="${{ steps.tag.outputs.tag }}"
          notes_file="$RUNNER_TEMP/release-body.md"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$ver" '
              /^## \[/ {
                if (p) { exit }
                if ($0 ~ "^## \\["ver"\\]") { p = 1; next }
              }
              p
            ' CHANGELOG.md > "$notes_file"
          fi
          if [ ! -s "$notes_file" ]; then
            echo "No CHANGELOG.md section for $ver — falling back to a stub." >&2
            echo "Release **$ver**. See [CHANGELOG.md](../blob/main/CHANGELOG.md)." > "$notes_file"
          fi
          echo "path=$notes_file" >> "$GITHUB_OUTPUT"
          echo "--- release body preview ---"
          cat "$notes_file"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: ${{ steps.notes.outputs.path }}
          # generate_release_notes appends the auto-generated commit /
          # PR list under the curated body.
          generate_release_notes: true
          files: |
            stage/ssv-prom-exporter-*.exe
            stage/ssv-prom-exporter-*.msi
            stage/ssv-prom-exporter-*.tar.gz
            stage/SHA256SUMS

      # ------------------ Docker image (linux/amd64 + arm64) ------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute exporter image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ssv-prom-exporter
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.tag }}

      - name: Build and push exporter image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            VERSION=${{ steps.tag.outputs.tag }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Compute prom-clip image metadata
        id: meta_promclip
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/prom-clip
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.tag }}

      - name: Build and push prom-clip image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prom-clip
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            VERSION=${{ steps.tag.outputs.tag }}
          tags: ${{ steps.meta_promclip.outputs.tags }}
          labels: ${{ steps.meta_promclip.outputs.labels }}
