apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      # Must match (or be a multiple of) the Prometheus scrape_interval
      # from gen-config.sh — Grafana uses it as the minimum step when
      # building $__interval and the API `step` param.
      timeInterval: 5s
      httpMethod: POST
