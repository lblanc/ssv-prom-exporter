# Test stack for ssv-prom-exporter: Prometheus + Grafana with the
# dashboards pre-provisioned.
#
# Two modes:
#
# 1) External exporters (default) — the exporter runs on the SAN host
#    (or anywhere reachable). Targets are declared via EXPORTER_TARGETS
#    in .env:
#        EXPORTER_TARGETS=lab=10.12.110.11:9876,prod=10.0.0.5:9876
#    The name becomes the `group` Prometheus label.
#        cd deploy && cp .env.example .env && $EDITOR .env
#        docker compose up -d
#
# 2) Full-stack (`--profile full`) — the exporter ALSO runs as a
#    service in this compose stack. Useful for demos and for sites that
#    prefer to run everything containerized. Configure with SSV_URL /
#    SSV_USER / SSV_PASS in .env. Bring up with:
#        docker compose --profile full up -d --build
#
# Grafana:    http://<host>:3000 (anonymous Viewer enabled by default;
#                                 admin / GF_ADMIN_PASSWORD to edit)
# Prometheus: http://<host>:9090

services:
  prometheus:
    image: prom/prometheus:v3.5.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      # gen-config.sh emits /tmp/prometheus.yml at start from EXPORTER_TARGETS.
      - ./prometheus/gen-config.sh:/usr/local/bin/gen-config.sh:ro
      - prometheus-data:/prometheus
    entrypoint:
      - /bin/sh
      - -c
      - |
        /usr/local/bin/gen-config.sh
        set -- \
            --config.file=/tmp/prometheus.yml \
            --storage.tsdb.path=/prometheus \
            --storage.tsdb.retention.time=15d \
            --web.enable-lifecycle
        # Optional: accept inbound remote-write payloads from prom-clip or
        # any other backfill tool. Off by default (Prometheus is pull-only
        # in normal use); set PROM_REMOTE_WRITE=1 in .env to enable.
        # gen-config.sh emits the matching out-of-order storage window
        # below so old samples are not silently dropped.
        if [ -n "$$PROM_REMOTE_WRITE" ]; then
          set -- "$$@" --web.enable-remote-write-receiver
        fi
        exec /bin/prometheus "$$@"
    environment:
      # In full-stack mode (--profile full) the `exporter` service below
      # registers a default target. EXPORTER_TARGETS overrides this.
      EXPORTER_TARGETS: ${EXPORTER_TARGETS:-${SSV_GROUP:-full}=exporter:9876}
      EXPORTER_TARGET: ${EXPORTER_TARGET:-}
      # Inbound remote-write (off by default). Set PROM_REMOTE_WRITE=1 in
      # .env to accept backfill from prom-clip. PROM_OOO_WINDOW (default
      # 7d) governs how far back imported samples may reach.
      PROM_REMOTE_WRITE: ${PROM_REMOTE_WRITE:-}
      PROM_OOO_WINDOW: ${PROM_OOO_WINDOW:-7d}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:12.0.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/ssv-overview.json
    depends_on:
      - prometheus

  # Full-stack only: the ssv-prom-exporter itself. Only started when
  # the `full` compose profile is activated:
  #     docker compose --profile full up -d --build
  exporter:
    image: ${EXPORTER_IMAGE:-ghcr.io/lblanc/ssv-prom-exporter:latest}
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: ["full"]
    # Internal port only — Prometheus scrapes it on the compose network.
    # Uncomment the ports mapping below if you want to curl /metrics
    # from the host while still in --profile full.
    # ports:
    #   - "9876:9876"
    environment:
      SSV_URL:  ${SSV_URL:?set SSV_URL in .env to use --profile full}
      SSV_USER: ${SSV_USER:?set SSV_USER in .env to use --profile full}
      SSV_PASS: ${SSV_PASS:?set SSV_PASS in .env to use --profile full}
      # Optional knobs — uncomment in .env as needed.
      SSV_BASES:        ${SSV_BASES:-}
      SSV_BACKUP_CIDRS: ${SSV_BACKUP_CIDRS:-}
    command: ["-listen", ":9876"]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://127.0.0.1:9876/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  prometheus-data:
  grafana-data:
