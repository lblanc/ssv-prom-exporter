global:
  scrape_interval: 30s
  evaluation_interval: 30s
  scrape_timeout: 15s
  external_labels:
    monitor: ssv-prom-exporter-test

scrape_configs:
  - job_name: ssv-prom-exporter
    metrics_path: /metrics
    static_configs:
      # __EXPORTER_TARGET__ is replaced by the compose entrypoint with
      # the value of the EXPORTER_TARGET env var at container start.
      - targets:
          - "__EXPORTER_TARGET__"
        labels:
          deployment: lab

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
